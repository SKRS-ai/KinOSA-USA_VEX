<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE PORTAL | Vexilla AITS Liaison</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Portal-specific UI */
        .portal-box {
            background: linear-gradient(145deg, #0a0a0a 0%, #020202 100%);
            border: 1px solid rgba(212, 175, 55, 0.1);
            padding: 4rem;
            border-radius: 50px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .portal-box::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(1000%); }
        }
        input {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 1.5rem;
            border-radius: 15px;
            color: white;
            font-family: monospace;
            width: 100%;
            margin-bottom: 1.5rem;
            transition: 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
        }
    </style>
</head>
<body class="antialiased">

    <header>
        <div class="header-container">
            <div class="logo-box">
                <a href="index.html"><img src="logo_makinzine_pro.png" alt="MAKINZINE PRO"></a>
            </div>
            <nav>
                <a href="index.html">Foundation</a>
                <a href="vanguard-registry.html">Vanguard</a>
                <a href="technical-manifesto.html">Technical</a>
                <span class="text-gold">Liaison</span>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-12 flex flex-col items-center justify-center min-h-[80vh]">
        
        <div class="text-center mb-16">
            <span class="text-gold font-black uppercase tracking-[0.5em] text-[10px] block mb-4">Encryption Level: AES-512</span>
            <h1 class="serif text-6xl mb-4 italic">Vexilla <span class="text-white">Liaison.</span></h1>
            <p class="text-gray-500 text-sm tracking-widest uppercase font-bold">Authorized Access Only</p>
        </div>

        <div class="portal-box w-full max-w-md">
            <form action="#">
                <label class="text-[9px] font-black uppercase tracking-widest text-gray-500 mb-2 block">Vexilla ID / Knight Hash</label>
                <input type="text" placeholder="0x000...000" required>
                
                <label class="text-[9px] font-black uppercase tracking-widest text-gray-500 mb-2 block">Secure Pass-Key</label>
                <input type="password" placeholder="••••••••" required>
                
                <button type="submit" class="w-full bg-white text-black font-black py-5 rounded-2xl uppercase tracking-[0.4em] text-[10px] hover:bg-gold transition-all duration-500">
                    Initialize Container
                </button>
            </form>
            
            <div class="mt-8 flex justify-between items-center opacity-30">
                <span class="text-[8px] font-bold text-white uppercase tracking-tighter">Status: Shield-Mode Active</span>
                <span class="text-[8px] font-bold text-white uppercase tracking-tighter">Node: PHL-01</span>
            </div>
        </div>

        <div class="mt-20 flex gap-12 opacity-20 hover:opacity-100 transition duration-700">
             
            <div class="text-center">
                <p class="text-[8px] font-black text-gold uppercase tracking-widest">Biometric Link</p>
                <div class="h-1 w-12 bg-gold/50 mx-auto mt-2"></div>
            </div>
            <div class="text-center">
                <p class="text-[8px] font-black text-gold uppercase tracking-widest">Haptic Auth</p>
                <div class="h-1 w-12 bg-gold/50 mx-auto mt-2"></div>
            </div>
            <div class="text-center">
                <p class="text-[8px] font-black text-gold uppercase tracking-widest">FIPS-Verified</p>
                <div class="h-1 w-12 bg-gold/50 mx-auto mt-2"></div>
            </div>
        </div>

    </main>

    <footer class="py-20 text-center">
        <div class="text-[8px] tracking-[1em] text-gray-700 font-black uppercase">
            Emergency Wipe Protocol: Active // Clear-Site Command: [000]
        </div>
    </footer>

</body>
</html>
