<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinOSA-USA_VEX | Elite Visual Interface</title>
    <style>
        :root {
            --vexilla-blue: #0047FF;
            --kin-gold: #D4AF37;
            --deep-black: #000000;
            --ui-white: #FFFFFF;
        }

        body, html {
            margin: 0;
            background: var(--deep-black);
            color: var(--ui-white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* The "Shine" Overlay - Simulates high-end magazine paper */
        .gloss-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.05) 100%);
            pointer-events: none;
            z-index: 999;
        }

        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 10%;
        }

        .hero-text {
            font-size: 12vw;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -5px;
            line-height: 0.8;
            background: linear-gradient(to bottom, #fff 50%, #333 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: 0.5s;
        }

        /* High-Prestige Grid for Subscriptions */
        .tier-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px; /* Thin lines like a luxury catalog */
            background: #222;
            border: 1px solid #222;
            width: 100%;
        }

        .tier-item {
            background: var(--deep-black);
            padding: 60px 20px;
            text-align: center;
            transition: background 0.3s;
        }

        .tier-item:hover {
            background: var(--vexilla-blue);
        }

        .tier-item h3 { font-size: 0.7rem; letter-spacing: 5px; color: var(--kin-gold); }
        .tier-item .amount { font-size: 3rem; margin: 20px 0; font-weight: 200; }

        /* The "Naked" Navigation */
        .magazine-nav {
            position: fixed;
            left: 50%;
            bottom: 50px;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }

        .page-dot {
            width: 8px; height: 8px;
            background: #444;
            border-radius: 50%;
            cursor: pointer;
        }

        .active { background: var(--vexilla-blue); box-shadow: 0 0 10px var(--vexilla-blue); }
    </style>
</head>
<body>

    <div class="gloss-overlay"></div>

    <section>
        <p style="letter-spacing: 10px; color: var(--kin-gold);">VEXILLA × SOLOMON KIN</p>
        <div class="hero-text">MAKIN<br>ZINE</div>
        <p style="margin-top: 40px; opacity: 0.5;">THE STANDARD FOR VISUAL SUPREMACY</p>
    </section>

    <section>
        <div class="tier-grid">
            <div class="tier-item">
                <h3>SCOUT</h3>
                <div class="amount">$10</div>
                <button style="background:none; border: 1px solid #444; color:white; padding: 10px 20px;">JOIN</button>
            </div>
            <div class="tier-item">
                <h3>ELITE</h3>
                <div class="amount">$50</div>
                <button style="background:none; border: 1px solid #444; color:white; padding: 10px 20px;">JOIN</button>
            </div>
            <div class="tier-item">
                <h3>VANGUARD</h3>
                <div class="amount">$150</div>
                <button style="background:none; border: 1px solid #444; color:white; padding: 10px 20px;">JOIN</button>
            </div>
            <div class="tier-item">
                <h3>LEGEND</h3>
                <div class="amount">$500</div>
                <button style="background:none; border: 1px solid #444; color:white; padding: 10px 20px;">JOIN</button>
            </div>
        </div>
    </section>

    <div class="magazine-nav">
        <div class="page-dot active"></div>
        <div class="page-dot"></div>
        <div class="page-dot"></div>
    </div>

</body>
</html>
