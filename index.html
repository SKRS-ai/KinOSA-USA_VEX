<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAKINZINE PRO | Vexilla AITS Foundation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@100;400;700;900&display=swap');

        :root {
            --obsidian: #020202;
            --gold: #d4af37;
        }

        body { background-color: var(--obsidian); color: #e5e5e5; font-family: 'Inter', sans-serif; margin: 0; }
        .serif { font-family: 'Playfair Display', serif; }

        /* THE SLIM HEADER FIX */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            /* Shortened vertical height of the bar itself */
            height: 80px; 
            display: flex;
            align-items: center;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 1800px;
            margin: 0 auto;
            padding: 0 4rem;
            position: relative;
        }

        /* LOGO: Maintains 240px size but overlaps the slim header */
        .logo-box {
            position: absolute;
            top: -20px; /* Pulls it up so it centers despite the slim bar */
            left: 4rem;
        }

        .logo-box img {
            height: 240px; 
            width: auto;
            display: block;
        }

        /* NAVIGATION: Pushed to the right to clear the logo space */
        nav {
            margin-left: auto;
            display: flex;
            gap: 3rem;
        }

        nav a, nav span {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            text-decoration: none;
        }

        /* HERO SECTION ADJUSTMENT */
        .hero-section {
            padding-top: 180px; /* Reduced since header is slimmer */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
    </style>
</head>
<body class="antialiased">

    <header>
        <div class="header-container">
            <div class="logo-box">
                <a href="index.html">
                    <img src="logo_makinzine_pro.png" alt="MAKINZINE PRO">
                </a>
            </div>
            <nav>
                <span class="text-gold">Foundation</span>
                <a href="gov-ops-fulfillment.html" class="opacity-50 hover:opacity-100 transition text-white">Gov-Ops</a>
                <a href="series-a-investor-deck.html" class="opacity-50 hover:opacity-100 transition text-white">Investors</a>
                <a href="secure-portal.html" class="opacity-50 hover:opacity-100 transition text-white">Liaison</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-12">
        <section class="hero-section">
            <div class="max-w-4xl">
                <h1 class="serif text-[120px] leading-[0.9] mb-12 italic">Fully <br><span class="text-gold">Charged.</span></h1>
                <p class="text-3xl text-gray-400 font-light leading-relaxed mb-16">
                    Makinzine Pro is the high-prestige terminal for the <span class="text-white font-bold">Vanguard Registry</span>. Built in Philadelphia, engineered for the State, and deployed for the permanent record.
                </p>
                <div class="flex gap-8">
                    <a href="technical-manifesto.html" class="border border-gold text-gold px-12 py-5 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-gold hover:text-black transition-all">The Manifesto</a>
                    <a href="vanguard-registry.html" class="bg-white text-black px-12 py-5 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-gold transition-all">Join the Registry</a>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
